name: releaser
description: Run the bombfork/releaser CLI in a workflow. Downloads the binary matching this action's version and invokes it.
author: bombfork

inputs:
  command:
    description: Releaser subcommand to invoke (e.g. "release", "release --dry-run").
    required: true
  version:
    description: |
      Release tag of bombfork/releaser to consume (e.g. "v0.9.0"). Required when
      the workflow pins this action to a commit SHA — at runtime the action
      cannot recover the tag from a SHA, and the release-asset download URL is
      tag-based. When unset, the action falls back to deriving the tag from
      its checkout path's basename, which works only when `uses:` references a
      tag directly.
    required: false
    default: ''
  app-id:
    description: |
      GitHub App ID. Pair with `app-installation-id` and `app-private-key`
      to authenticate as a GitHub App installation. The App must be
      installed on the target repository with contents:write and
      pull-requests:write permissions. Mutually exclusive with `token`.
    required: false
    default: ''
  app-installation-id:
    description: GitHub App installation ID for the target repository.
    required: false
    default: ''
  app-private-key:
    description: GitHub App private key in PEM format. Pass via a secret.
    required: false
    default: ''
  token:
    description: |
      GitHub API token. Pass `secrets.GITHUB_TOKEN`, a PAT, or any other
      installation/access token. Mutually exclusive with the `app-*`
      inputs.
    required: false
    default: ''
  working-directory:
    description: Directory in which to run the releaser command.
    required: false
    default: ${{ github.workspace }}

runs:
  using: composite
  steps:
    - name: Validate authentication inputs
      shell: bash
      env:
        APP_ID: ${{ inputs.app-id }}
        APP_INST_ID: ${{ inputs.app-installation-id }}
        APP_PEM: ${{ inputs.app-private-key }}
        TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        app_any=false
        if [[ -n "${APP_ID}" || -n "${APP_INST_ID}" || -n "${APP_PEM}" ]]; then
          app_any=true
        fi
        token_set=false
        if [[ -n "${TOKEN}" ]]; then
          token_set=true
        fi
        if [[ "${app_any}" == "true" && "${token_set}" == "true" ]]; then
          echo "::error::releaser: pass either the app-* inputs or token, not both" >&2
          exit 1
        fi
        if [[ "${app_any}" == "true" ]]; then
          if [[ -z "${APP_ID}" || -z "${APP_INST_ID}" || -z "${APP_PEM}" ]]; then
            echo "::error::releaser: when using GitHub App auth, all of app-id, app-installation-id, and app-private-key must be set" >&2
            exit 1
          fi
        fi
        if [[ "${app_any}" == "false" && "${token_set}" == "false" ]]; then
          echo "::error::releaser: no authentication provided. Pass either app-id/app-installation-id/app-private-key, or token (e.g. \${{ secrets.GITHUB_TOKEN }})" >&2
          exit 1
        fi

    - name: Resolve action version
      id: version
      shell: bash
      env:
        VERSION_INPUT: ${{ inputs.version }}
      run: |
        # Prefer the explicit `version` input — required when the caller
        # pins this action by SHA, since the SHA can't be reverse-mapped
        # to a release tag at runtime. Fall back to the basename of
        # github.action_path (the ref the action was checked out at),
        # which works for tag-pinned callers. github.action_ref is
        # unreliable inside composite actions and shows as empty in some
        # runner contexts, so it's not used here.
        if [[ -n "${VERSION_INPUT}" ]]; then
          ref="${VERSION_INPUT}"
        else
          ref="$(basename "${{ github.action_path }}")"
        fi
        if [[ -z "${ref}" ]]; then
          echo "could not resolve action version: pass with: version: or use tag-pinned uses:" >&2
          exit 1
        fi
        echo "version=${ref}" >> "${GITHUB_OUTPUT}"

    - name: Resolve platform
      id: platform
      shell: bash
      run: |
        case "${RUNNER_OS}" in
          Linux)   os=linux ;;
          macOS)   os=darwin ;;
          Windows) os=windows ;;
          *) echo "unsupported runner OS: ${RUNNER_OS}" >&2; exit 1 ;;
        esac
        case "${RUNNER_ARCH}" in
          X64)   arch=amd64 ;;
          ARM64) arch=arm64 ;;
          *) echo "unsupported runner arch: ${RUNNER_ARCH}" >&2; exit 1 ;;
        esac
        echo "os=${os}" >> "${GITHUB_OUTPUT}"
        echo "arch=${arch}" >> "${GITHUB_OUTPUT}"

    - name: Restore releaser binary from cache
      id: cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ${{ runner.tool_cache }}/releaser/${{ steps.version.outputs.version }}
        key: releaser-${{ steps.version.outputs.version }}-${{ steps.platform.outputs.os }}-${{ steps.platform.outputs.arch }}

    - name: Download releaser binary
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        VERSION: ${{ steps.version.outputs.version }}
        OS: ${{ steps.platform.outputs.os }}
        ARCH: ${{ steps.platform.outputs.arch }}
        TOOL_CACHE: ${{ runner.tool_cache }}
      run: |
        set -euo pipefail
        dest="${TOOL_CACHE}/releaser/${VERSION}"
        mkdir -p "${dest}"
        url="https://github.com/bombfork/releaser/releases/download/${VERSION}/releaser_${OS}_${ARCH}.tar.gz"
        echo "Downloading ${url}"
        curl --fail --location --silent --show-error --output /tmp/releaser.tgz "${url}"
        tar -xzf /tmp/releaser.tgz -C "${dest}"
        rm -f /tmp/releaser.tgz
        chmod +x "${dest}/releaser"

    - name: Run releaser
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GH_TKN_APP_ID: ${{ inputs.app-id }}
        GH_TKN_APP_INST_ID: ${{ inputs.app-installation-id }}
        GH_TKN_APP_PRIVATE_KEY: ${{ inputs.app-private-key }}
        GH_TKN: ${{ inputs.token }}
        RELEASER_BIN: ${{ runner.tool_cache }}/releaser/${{ steps.version.outputs.version }}/releaser
        RELEASER_ARGS: ${{ inputs.command }}
      run: |
        set -euo pipefail
        eval "${RELEASER_BIN} ${RELEASER_ARGS}"
