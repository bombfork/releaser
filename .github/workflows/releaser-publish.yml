# Generated by releaser. Re-running `releaser generate` will overwrite
# this file; the `jdx/mise-action` step below is hand-added because we
# don't yet have a stack-specific adapter that injects setup steps via
# Adapter.WorkflowSnippets. When that lands, this manual edit is gone.
#
# This workflow publishes a release. It runs on every push to the
# default branch (most commonly the merge commit of the pending-release
# PR) and is a no-op when no new version is detected, so direct pushes
# to the default branch that don't bump the version cost only the
# initial read-only API calls.
#
# Idempotent: re-runs on a partially completed release only perform the
# steps that are still missing.
#
# Also exposed as workflow_dispatch so a release can be retried manually
# (with optional dry-run).

name: releaser publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without side effects (no release creation, no build, no asset uploads)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install build toolchain via mise (go, goreleaser, …)
        uses: jdx/mise-action@v2
      - name: Publish release
        uses: bombfork/releaser@v0.0.1
        with:
          command: release publish ${{ inputs.dry_run && '--dry-run' || '' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
