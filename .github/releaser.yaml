adapter:
    type: go
    build:
        command: ./scripts/package.sh
        artifacts: dist/releaser_*.tar.gz
        targets:
            - os: linux
              arch: amd64
            - os: linux
              arch: arm64
            - os: darwin
              arch: amd64
            - os: darwin
              arch: arm64
            - os: windows
              arch: amd64
    version:
        locations:
            - path: internal/cli/root.go
              regex: ^var Version = "(.*)"$
release:
    default_branch: main
