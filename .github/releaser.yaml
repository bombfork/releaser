adapter:
    type: go
    build:
        command: ./scripts/package.sh
        artifacts:
            - dist/releaser_*.tar.gz
            - dist/checksums.txt
        targets:
            - os: linux
              arch: amd64
            - os: linux
              arch: arm64
            - os: darwin
              arch: amd64
            - os: darwin
              arch: arm64
            - os: windows
              arch: amd64
    version:
        locations:
            - path: internal/cli/root.go
              regex: ^var Version = "(.*)"$
            - path: .github/workflows/releaser-pending-release.yml
              regex: 'uses: bombfork/releaser@v(.*)$'
            - path: .github/workflows/releaser-publish.yml
              regex: 'uses: bombfork/releaser@v(.*)$'
release:
    default_branch: main
