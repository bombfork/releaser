adapter:
    type: go
    build:
        command: ./scripts/package.sh
        artifacts:
            - dist/releaser_*.tar.gz
            - dist/checksums.txt
        targets:
            - os: linux
              arch: amd64
            - os: linux
              arch: arm64
            - os: darwin
              arch: amd64
            - os: darwin
              arch: arm64
            - os: windows
              arch: amd64
    version:
        locations:
            - path: internal/cli/root.go
              regex: ^var Version = "(.*)"$
release:
    default_branch: main
    auth:
        mode: github_app
        app:
            app_id_var: RELEASER_APP_ID
            installation_id_var: RELEASER_APP_INSTALLATION_ID
            private_key_secret: RELEASER_APP_PRIVATE_KEY
